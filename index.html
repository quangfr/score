<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCORE</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">SCORE</div>
        <nav class="nav">
          <div class="nav-group-label">Navigation</div>
          <button class="nav-item active" type="button" data-view="contracts"><span data-lucide="folder"></span><span>Contrats</span></button>
          <button class="nav-item" type="button" data-view="referentials"><span data-lucide="listTree"></span><span>Référentiels</span></button>
          <button class="nav-item" type="button" data-view="docs"><span data-lucide="fileText"></span><span>Docs</span></button>
          <div class="nav-group-label">Outils</div>
          <button class="nav-item" type="button" data-view="api"><span data-lucide="blocks"></span><span>Console API</span></button>
        </nav>
      </aside>

      <main class="main">
        <section id="contractsView" class="panel">
          <div class="panel-head">
            <h1>Contrats</h1>
            <div class="panel-head-actions">
              <span id="contractsCount" class="subtle"></span>
              <button id="openCreateContractModalButton" class="icon-button" type="button" aria-label="Créer un contrat">
                <span data-lucide="plus"></span>
              </button>
            </div>
          </div>

          <div class="filters hidden" aria-hidden="true">
            <input id="searchInput" type="search" placeholder="Rechercher" />
            <select id="statusFilter">
              <option value="">Statut</option>
            </select>
            <select id="typeFilter">
              <option value="">Type</option>
            </select>
          </div>

          <div id="contractsList" class="contracts-table-shell"></div>
        </section>

        <section id="docsView" class="panel docs-panel hidden">
          <div class="panel-head">
            <h1>Docs</h1>
            <span class="subtle">Documentation technique, fonctionnelle et architecture de données</span>
          </div>
          <div class="docs-content">
            <div id="docsContent" class="docs-shell docs-prose"></div>
          </div>
        </section>

        <section id="referentialsView" class="panel hidden">
          <div class="panel-head">
            <h1>Référentiels</h1>
            <span id="referentialsCount" class="subtle"></span>
          </div>
          <div id="referentialsContent" class="referentials-content"></div>
        </section>

        <section id="apiConsole" class="panel hidden">
          <div id="apiConsoleContent" class="console-content compact-console-content"></div>
        </section>
      </main>

    </div>

    <div id="contractModal" class="modal" aria-hidden="true">
      <div class="modal-body">
        <div class="modal-head">
          <div id="contractModalHeader" class="modal-head-main"></div>
          <button id="closeContractModalButton" class="icon-button" type="button" aria-label="Fermer">
            <span data-lucide="x"></span>
          </button>
        </div>
        <div id="contractModalContent" class="modal-content"></div>
      </div>
    </div>

    <script type="module">
      import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

      mermaid.initialize({
        startOnLoad: false,
        theme: "neutral",
        securityLevel: "loose",
      });

      const state = {
        customers: [],
        lists: {},
        contracts: [],
        filteredContracts: [],
        selectedContractId: null,
        apiEndpoint: "contracts-get-list",
        apiResponseState: null,
        apiRequestDrafts: {},
        activeView: "contracts",
        activeReferentialTab: "customers",
        docsMarkdown: "",
        filterMode: "2",
        headerFiltersOpen: false,
        activeHeaderPopover: null,
        popoverSearch: "",
        contractModalTab: "Informations générales",
        contractModalMode: "edit",
        draftContract: null,
        contractFormErrors: [],
        columnFilters: {
          reference: { text: "" },
          contract: { text: "" },
          client: { text: "", selected: [] },
          type: { text: "", selected: [] },
          region: { text: "", selected: [] },
          status: { text: "", selected: [] },
        },
      };

      const persistence = {
        dbName: "contratheque-db",
        storeName: "appState",
        snapshotKey: "dataset",
        db: null,
        saveTimer: null,
      };

      const elements = {
        appShell: document.querySelector(".app-shell"),
        navItems: [...document.querySelectorAll("[data-view]")],
        contractsView: document.getElementById("contractsView"),
        docsView: document.getElementById("docsView"),
        referentialsView: document.getElementById("referentialsView"),
        apiView: document.getElementById("apiConsole"),
        searchInput: document.getElementById("searchInput"),
        statusFilter: document.getElementById("statusFilter"),
        typeFilter: document.getElementById("typeFilter"),
        contractsCount: document.getElementById("contractsCount"),
        contractsList: document.getElementById("contractsList"),
        openCreateContractModalButton: document.getElementById("openCreateContractModalButton"),
        apiConsoleContent: document.getElementById("apiConsoleContent"),
        apiContractSelect: document.getElementById("apiContractSelect"),
        closeContractModalButton: document.getElementById("closeContractModalButton"),
        contractModal: document.getElementById("contractModal"),
        contractModalHeader: document.getElementById("contractModalHeader"),
        contractModalContent: document.getElementById("contractModalContent"),
        docsContent: document.getElementById("docsContent"),
        referentialsContent: document.getElementById("referentialsContent"),
        referentialsCount: document.getElementById("referentialsCount"),
      };

      const lucideIcons = {
        fullscreen: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 3H5a2 2 0 0 0-2 2v3"></path>
            <path d="M16 3h3a2 2 0 0 1 2 2v3"></path>
            <path d="M8 21H5a2 2 0 0 1-2-2v-3"></path>
            <path d="M16 21h3a2 2 0 0 0 2-2v-3"></path>
          </svg>
        `,
        x: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        `,
        filter: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22 3H2l8 9.46V19l4 2v-8.54z"></path>
          </svg>
        `,
        plus: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5v14"></path>
            <path d="M5 12h14"></path>
          </svg>
        `,
        folder: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-8z"></path>
            <path d="M2 8h20"></path>
          </svg>
        `,
        users: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <path d="M20 8v6"></path>
            <path d="M23 11h-6"></path>
          </svg>
        `,
        wallet: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-3"></path>
            <path d="M3 7h18v10H3z"></path>
            <path d="M17 12h.01"></path>
          </svg>
        `,
        plane: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="m10 10-7 1 1 2 4 1 1 4 2 1 1-7 7-7a1.414 1.414 0 0 0-2-2z"></path>
            <path d="M17 7 7 17"></path>
          </svg>
        `,
        fileText: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <path d="M14 2v6h6"></path>
            <path d="M16 13H8"></path>
            <path d="M16 17H8"></path>
            <path d="M10 9H8"></path>
          </svg>
        `,
        blocks: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7" rx="1"></rect>
            <rect x="14" y="3" width="7" height="7" rx="1"></rect>
            <rect x="14" y="14" width="7" height="7" rx="1"></rect>
            <rect x="3" y="14" width="7" height="7" rx="1"></rect>
          </svg>
        `,
        mapPinned: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 17v5"></path>
            <path d="M9 3h6l3 7-6 3-6-3z"></path>
          </svg>
        `,
        circleDollarSign: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M16 8h-6a2 2 0 0 0 0 4h4a2 2 0 0 1 0 4H8"></path>
            <path d="M12 18V6"></path>
          </svg>
        `,
        listTree: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12h-8"></path>
            <path d="M21 6H8"></path>
            <path d="M21 18h-8"></path>
            <path d="M3 6h.01"></path>
            <path d="M3 12h.01"></path>
            <path d="M3 18h.01"></path>
          </svg>
        `,
        shieldCheck: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 13c0 5-3.5 7.5-8 9-4.5-1.5-8-4-8-9V5l8-3 8 3z"></path>
            <path d="m9 12 2 2 4-4"></path>
          </svg>
        `,
        badgeEuro: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 8h8"></path>
            <path d="M7 12h7"></path>
            <path d="M14 18a5 5 0 1 1 0-10"></path>
            <path d="M12 2 4 5v6c0 5 3.5 7.5 8 9 4.5-1.5 8-4 8-9V5z"></path>
          </svg>
        `,
        building: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="2" width="16" height="20" rx="2"></rect>
            <path d="M9 22v-4h6v4"></path>
            <path d="M8 6h.01"></path>
            <path d="M16 6h.01"></path>
            <path d="M8 10h.01"></path>
            <path d="M16 10h.01"></path>
            <path d="M8 14h.01"></path>
            <path d="M16 14h.01"></path>
          </svg>
        `,
      };

      const formatDate = (value) =>
        new Intl.DateTimeFormat("fr-FR", {
          year: "numeric",
          month: "short",
          day: "numeric",
        }).format(new Date(value));

      const formatCurrency = (value, currency) =>
        new Intl.NumberFormat("fr-FR", {
          style: "currency",
          currency,
          maximumFractionDigits: 0,
        }).format(value);

      const escapeHtml = (value) =>
        String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");

      const inlineMarkdown = (value) =>
        escapeHtml(value)
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');

      function renderIcons(root = document) {
        root.querySelectorAll("[data-lucide]").forEach((node) => {
          const iconName = node.dataset.lucide;
          node.innerHTML = lucideIcons[iconName] || "";
        });
      }

      function widgetStatusClass(status) {
        return ["Valid", "Validé", "Closed", "Clos"].includes(status) ? "status-valid" : "status-warning";
      }

      function buildOptions(select, values) {
        const baseLabel = select === elements.statusFilter ? "Statut" : "Type";
        select.innerHTML = `<option value="">${baseLabel}</option>${values
          .map((value) => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`)
          .join("")}`;
      }

      function buildContractSelectOptions() {
        if (!elements.apiContractSelect) {
          return;
        }
        elements.apiContractSelect.innerHTML = `
          <option value="">Contrat sélectionné</option>
          ${state.contracts
            .map(
              (contract) => `
                <option value="${escapeHtml(contract.id)}">${escapeHtml(contract.id)} · ${escapeHtml(contract.name)}</option>
              `
            )
          .join("")}
        `;
      }

      function refreshDerivedControls() {
        buildOptions(elements.statusFilter, [...new Set(state.contracts.map((contract) => contract.status))]);
        buildOptions(elements.typeFilter, [...new Set(state.contracts.map((contract) => contract.type))]);
        buildContractSelectOptions();
      }

      function getFilterOptions(key) {
        const valuesByKey = {
          client: [...new Set(state.contracts.map((contract) => hydrateContract(contract)?.customer.name).filter(Boolean))],
          type: [...new Set(state.contracts.map((contract) => contract.type).filter(Boolean))],
          region: [...new Set(state.contracts.map((contract) => contract.region).filter(Boolean))],
          status: [...new Set(state.contracts.map((contract) => contract.globalValidationStatus).filter(Boolean))],
        };

        return (valuesByKey[key] || []).sort((a, b) => a.localeCompare(b, "fr"));
      }

      function getColumnFilterValue(key) {
        return state.columnFilters[key] || { text: "", selected: [] };
      }

      function setColumnTextFilter(key, value) {
        state.columnFilters[key] = {
          ...getColumnFilterValue(key),
          text: value,
        };
        render();
      }

      function toggleColumnSelectedValue(key, value) {
        const current = getColumnFilterValue(key);
        const selected = new Set(current.selected || []);
        if (selected.has(value)) {
          selected.delete(value);
        } else {
          selected.add(value);
        }
        state.columnFilters[key] = {
          ...current,
          selected: [...selected],
        };
        render();
      }

      function clearAllColumnFilters() {
        state.columnFilters = {
          reference: { text: "" },
          contract: { text: "" },
          client: { text: "", selected: [] },
          type: { text: "", selected: [] },
          region: { text: "", selected: [] },
          status: { text: "", selected: [] },
        };
        state.popoverSearch = "";
      }

      function renderFilterControl(key, label, type = "text") {
        const value = getColumnFilterValue(key);
        if (type === "select") {
          return `
            <select data-column-filter="${key}" aria-label="${escapeHtml(label)}">
              <option value="">Tous</option>
              ${getFilterOptions(key)
                .map((option) => `<option value="${escapeHtml(option)}"${option === value.text ? " selected" : ""}>${escapeHtml(option)}</option>`)
                .join("")}
            </select>
          `;
        }

        return `
          <input
            data-column-filter="${key}"
            type="search"
            value="${escapeHtml(value.text || "")}"
            placeholder="${escapeHtml(label)}"
            aria-label="${escapeHtml(label)}"
          />
        `;
      }

      function hasActiveFilter(key) {
        const value = getColumnFilterValue(key);
        return Boolean(value.text) || Boolean((value.selected || []).length);
      }

      function renderPopoverFilter(key, label, mode = "text") {
        const isOpen = state.activeHeaderPopover === key;
        const hasValue = hasActiveFilter(key);
        const current = getColumnFilterValue(key);
        const options = getFilterOptions(key).filter((option) =>
          option.toLowerCase().includes(state.popoverSearch.toLowerCase())
        );
        return `
          <div class="header-popover-slot">
            <button
              class="header-filter-button${hasValue ? " is-active" : ""}"
              type="button"
              data-filter-popover-toggle="${key}"
              aria-expanded="${isOpen ? "true" : "false"}"
              aria-label="Filtrer ${escapeHtml(label)}"
            >
              <span data-lucide="filter"></span>
            </button>
            ${
              isOpen
                ? `
                  <div class="header-popover" data-filter-popover="${key}">
                    <div class="header-popover-title">${escapeHtml(label)}</div>
                    <input
                      type="search"
                      value="${escapeHtml(mode === "text" ? current.text || "" : state.popoverSearch)}"
                      placeholder="Rechercher"
                      data-filter-search="${key}"
                      aria-label="Rechercher dans ${escapeHtml(label)}"
                    />
                    <button class="popover-reset-button" type="button" data-filter-reset="${key}">Réinitialiser</button>
                    ${
                      mode === "multi"
                        ? `
                          <div class="header-checklist">
                            ${options.length
                              ? options
                                  .map(
                                    (option) => `
                                      <label class="check-option">
                                        <input
                                          type="checkbox"
                                          data-filter-option="${key}"
                                          value="${escapeHtml(option)}"
                                          ${(current.selected || []).includes(option) ? "checked" : ""}
                                        />
                                        <span>${escapeHtml(option)}</span>
                                      </label>
                                    `
                                  )
                                  .join("")
                              : `<div class="subtle">Aucun résultat</div>`}
                          </div>
                        `
                        : ""
                    }
                  </div>
                `
                : ""
            }
          </div>
        `;
      }

      function renderHeaderFilters() {
        const visibleInline = state.filterMode === "1" || (state.filterMode === "3" && state.headerFiltersOpen);
        if (!visibleInline) {
          return "";
        }

        return `
          <tr class="contracts-filter-row">
            <th>${renderFilterControl("reference", "Référence")}</th>
            <th>${renderFilterControl("contract", "Contrat")}</th>
            <th>${renderFilterControl("client", "Client")}</th>
            <th>${renderFilterControl("type", "Type", "select")}</th>
            <th>${renderFilterControl("region", "Région", "select")}</th>
            <th></th>
            <th>${renderFilterControl("status", "Statut", "select")}</th>
          </tr>
        `;
      }

      function getCustomerById(customerId) {
        return state.customers.find((customer) => customer.id === customerId) || null;
      }

      function hydrateContract(contract) {
        if (!contract) {
          return null;
        }

        const customer = getCustomerById(contract.customerId) || {
          id: "",
          name: "Client inconnu",
          accountCode: "",
          country: "",
        };

        return {
          ...contract,
          customer,
        };
      }

      function getSelectedContract() {
        const contract = state.contracts.find((item) => item.id === state.selectedContractId) || state.filteredContracts[0] || null;
        return hydrateContract(contract);
      }

      function getApiContract() {
        const contract = state.contracts.find((item) => item.id === state.selectedContractId) || state.contracts[0] || null;
        return hydrateContract(contract);
      }

      function formatLabel(value) {
        return String(value)
          .replaceAll(/([a-z0-9])([A-Z])/g, "$1 $2")
          .replaceAll("_", " ")
          .replaceAll("-", " ")
          .replace(/\s+/g, " ")
          .trim()
          .replace(/^./, (char) => char.toUpperCase());
      }

      function renderKeyValueRows(entries) {
        return entries
          .map(
            ([label, value]) => `
              <div class="key-value">
                <span>${escapeHtml(label)}</span>
                <strong>${escapeHtml(value)}</strong>
              </div>
            `
          )
          .join("");
      }

      function renderWidgetData(widget) {
        if (!widget?.data) {
          return "";
        }

        if (widget.type === "table") {
          const items = Array.isArray(widget.data.items) ? widget.data.items : [];
          return `
            <div class="widget-table">
              ${items
                .map(
                  (item) => `
                    <div class="key-value">
                      <span>${escapeHtml(item.label)}</span>
                      <strong>${escapeHtml(item.value)}</strong>
                    </div>
                  `
                )
                .join("")}
            </div>
          `;
        }

        if (widget.type === "article") {
          const paragraphs = Array.isArray(widget.data.paragraphs) ? widget.data.paragraphs : [];
          return `
            <div class="widget-paragraphs">
              ${paragraphs.map((paragraph) => `<p>${escapeHtml(paragraph)}</p>`).join("")}
            </div>
          `;
        }

        return `
          <div class="widget-data-list">
            ${Object.entries(widget.data)
              .map(
                ([key, value]) => `
                  <div class="widget-data-row">
                    <span class="subtle">${escapeHtml(formatLabel(key))}</span>
                    <strong>${escapeHtml(value)}</strong>
                  </div>
                `
              )
              .join("")}
          </div>
        `;
      }

      function buildPreviewHtml(contract) {
        const editable = false;
        if (!contract) {
          return `<div class="empty">Aucun contrat</div>`;
        }

        const pages = contract.pdfSimulation?.pages || [];
        const widgets = contract.widgets || [];
        const metadataEntries = [
          ["Client", contract.customer.name],
          ["Code compte", contract.customer.accountCode],
          ["Pays", contract.customer.country],
          ["Région", contract.region],
          ["Période", `${formatDate(contract.startDate)} - ${formatDate(contract.endDate)}`],
          ["Statut contrat", contract.status],
          ["Équipe", contract.managingTeam.name],
          ["Contact", contract.managingTeam.contact],
          ["Email", contract.managingTeam.email],
          ["Téléphone", contract.managingTeam.phone],
          ["Société", contract.managingTeam.company],
        ];
        const financialEntries = [
          ["Valeur estimée", formatCurrency(contract.financials.estimatedAnnualValue, contract.financials.currency)],
          ["Devise", contract.financials.currency],
          ["Modèle de facturation", contract.financials.billingModel],
          ["Révision tarifaire", contract.financials.rateRevision],
        ];
        const fleetEntries = [
          ["Programme", contract.fleet.program],
          ["Moteurs couverts", String(contract.fleet.enginesCovered)],
          ["Avions couverts", String(contract.fleet.aircraftCovered)],
          ["Base", contract.fleet.base],
        ];
        const documentEntries = [
          ["PDF source", contract.documents.sourcePdf],
          ["Résumé IA", contract.documents.summaryAi],
          ["Pages importantes", (contract.documents.importantPages || []).join(", ")],
        ];

        return `
          <article class="contract-sheet">
            <div class="sheet-title-row">
              <div class="stack">
                <div class="subtle">${escapeHtml(contract.id)} · ${escapeHtml(contract.type)}</div>
                <h3>${escapeHtml(contract.name)}</h3>
              </div>
              <span class="pill ${widgetStatusClass(contract.globalValidationStatus)}">${escapeHtml(contract.globalValidationStatus)}</span>
            </div>

            <div class="preview-meta">
              <div class="subtle">Prévisualisation du contrat et de tous ses widgets</div>
              <span class="tag">${widgets.length} widget${widgets.length > 1 ? "s" : ""}</span>
            </div>

            <div class="sheet-section">
              <div class="key-values">
                ${renderKeyValueRows(metadataEntries)}
              </div>
            </div>

            <div class="sheet-section">
              <h4>Finance</h4>
              <div class="key-values">
                ${renderKeyValueRows(financialEntries)}
              </div>
            </div>

            <div class="sheet-section">
              <h4>Flotte</h4>
              <div class="key-values">
                ${renderKeyValueRows(fleetEntries)}
              </div>
            </div>

            <div class="sheet-section">
              <h4>Documents</h4>
              <div class="key-values">
                ${renderKeyValueRows(documentEntries)}
              </div>
            </div>

            <div class="sheet-section">
              <h4>Widgets du contrat</h4>
              <div class="widget-list">
                ${widgets
                  .map(
                    (widget) => `
                      <article class="widget-card">
                        <div class="widget-head">
                          <div class="stack">
                            <h4>${escapeHtml(widget.name)}</h4>
                            <div class="subtle">${escapeHtml(widget.id)} · ${escapeHtml(widget.type)}</div>
                          </div>
                          <span class="pill ${widgetStatusClass(widget.status)}">${escapeHtml(widget.status)}</span>
                        </div>

                        <div class="widget-meta">
                          <div class="row"><span class="subtle">Dernier changement</span><strong>${escapeHtml(formatDate(widget.lastStatusChange))}</strong></div>
                          <div class="row"><span class="subtle">Accès lecture</span><strong>${escapeHtml(widget.readAccess)}</strong></div>
                          <div class="row"><span class="subtle">Accès édition</span><strong>${escapeHtml(widget.editAccess)}</strong></div>
                        </div>

                        ${renderWidgetData(widget)}
                      </article>
                    `
                  )
                  .join("")}
              </div>
            </div>

            ${
              pages.length
                ? `
                  <div class="sheet-section">
                    <h4>Extraits PDF</h4>
                    ${pages
                      .map(
                        (page) => `
                          <div class="preview-subsection">
                            <h4>${escapeHtml(page.heading)}</h4>
                            ${page.content.map((line) => `<p>${escapeHtml(line)}</p>`).join("")}
                          </div>
                        `
                      )
                      .join("")}
                  </div>
                `
                : ""
            }
          </article>
        `;
      }

      function getListOptions(key) {
        return state.lists[key] || [];
      }

      function buildDatasetSnapshot() {
        return {
          customers: structuredClone(state.customers),
          ...structuredClone(state.lists),
          contracts: structuredClone(state.contracts),
        };
      }

      function applyDatasetSnapshot(payload) {
        state.customers = payload.customers || [];
        state.lists = getRootReferentials(payload);
        state.contracts = payload.contracts || [];
        state.filteredContracts = [...state.contracts];
        state.selectedContractId = state.contracts[0]?.id || null;
      }

      function openIndexedDb() {
        if (persistence.db) {
          return Promise.resolve(persistence.db);
        }

        return new Promise((resolve, reject) => {
          const request = window.indexedDB.open(persistence.dbName, 1);

          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(persistence.storeName)) {
              db.createObjectStore(persistence.storeName);
            }
          };

          request.onsuccess = () => {
            persistence.db = request.result;
            resolve(persistence.db);
          };

          request.onerror = () => {
            reject(request.error);
          };
        });
      }

      async function loadDatasetFromIndexedDb() {
        const db = await openIndexedDb();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(persistence.storeName, "readonly");
          const store = transaction.objectStore(persistence.storeName);
          const request = store.get(persistence.snapshotKey);

          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => reject(request.error);
        });
      }

      async function persistDatasetToIndexedDb() {
        const db = await openIndexedDb();
        const snapshot = buildDatasetSnapshot();

        return new Promise((resolve, reject) => {
          const transaction = db.transaction(persistence.storeName, "readwrite");
          const store = transaction.objectStore(persistence.storeName);
          const request = store.put(
            {
              updatedAt: new Date().toISOString(),
              payload: snapshot,
            },
            persistence.snapshotKey
          );

          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }

      function scheduleDatasetPersist() {
        window.clearTimeout(persistence.saveTimer);
        persistence.saveTimer = window.setTimeout(() => {
          persistDatasetToIndexedDb().catch((error) => console.error("IndexedDB save failed", error));
        }, 150);
      }

      function getReferentialKeys() {
        return ["customers", ...Object.keys(state.lists)];
      }

      function getRootReferentials(payload) {
        return Object.fromEntries(
          Object.entries(payload).filter(([key]) => !["customers", "contracts"].includes(key))
        );
      }

      function getReferentialPresentation(key) {
        const dictionary = {
          customers: { label: "Clients", icon: "users" },
          contractTypes: { label: "Types de contrat", icon: "folder" },
          regions: { label: "Régions", icon: "mapPinned" },
          contractStatuses: { label: "Statuts contrat", icon: "badgeEuro" },
          validationStatuses: { label: "Statuts de validation", icon: "shieldCheck" },
          currencies: { label: "Devises", icon: "circleDollarSign" },
          billingModels: { label: "Modèles de facturation", icon: "wallet" },
          programs: { label: "Programmes", icon: "plane" },
          summaryStatuses: { label: "Statuts de résumé IA", icon: "fileText" },
          managingCompanies: { label: "Sociétés gestionnaires", icon: "building" },
          widgetStatuses: { label: "Statuts de widget", icon: "blocks" },
          widgetReadAccesses: { label: "Accès lecture widget", icon: "listTree" },
          widgetEditAccesses: { label: "Accès édition widget", icon: "listTree" },
        };

        return dictionary[key] || { label: formatLabel(key), icon: "folder" };
      }

      function getDatasetSnapshotWithHydration() {
        return {
          customers: state.customers,
          ...state.lists,
          contracts: state.contracts.map((contract) => hydrateContract(contract)),
        };
      }

      function buildContractSummary(contract) {
        const hydratedContract = hydrateContract(contract);
        return {
          id: contract.id,
          name: contract.name,
          type: contract.type,
          status: contract.status,
          globalValidationStatus: contract.globalValidationStatus,
          customer: hydratedContract.customer,
          region: contract.region,
          startDate: contract.startDate,
          endDate: contract.endDate,
        };
      }

      function getApiDefaultDraft(spec) {
        const sample = spec.requestSample?.body ?? spec.requestSample?.query ?? spec.requestSample?.params ?? {};
        return JSON.stringify(sample, null, 2);
      }

      function ensureApiRequestDraft(endpointId, specs) {
        if (state.apiRequestDrafts[endpointId] !== undefined) {
          return state.apiRequestDrafts[endpointId];
        }

        const spec = specs[endpointId];
        const draft = getApiDefaultDraft(spec);
        state.apiRequestDrafts[endpointId] = draft;
        return draft;
      }

      function parseApiRequestDraft(text) {
        const trimmed = String(text || "").trim();
        if (!trimmed) {
          return {};
        }

        return JSON.parse(trimmed);
      }

      async function commitApiMutation() {
        await persistDatasetToIndexedDb();
        refreshDerivedControls();
      }

      async function executeApiRequest(endpointId) {
        const specs = getApiEndpointSpecs();
        const spec = specs[endpointId];
        if (!spec) {
          return {
            route: "UNKNOWN",
            meta: ["400 Bad Request", "Route inconnue"],
            payload: { error: "Unknown route" },
          };
        }

        const liveRecord = await loadDatasetFromIndexedDb().catch(() => null);
        if (liveRecord?.payload) {
          applyDatasetSnapshot(liveRecord.payload);
        }

        const body = parseApiRequestDraft(state.apiRequestDrafts[endpointId] ?? getApiDefaultDraft(spec));
        const selectedContract = getApiContract();

        if (endpointId === "contracts-get-list") {
          return {
            route: `${spec.method} ${spec.path}`,
            meta: ["200 OK", "Content-Type: application/json", "IndexedDB read"],
            payload: {
              count: state.contracts.length,
              contracts: state.contracts.map((contract) => buildContractSummary(contract)),
            },
          };
        }

        if (endpointId === "contracts-get-one") {
          if (!selectedContract) {
            return {
              route: `${spec.method} ${spec.path}`,
              meta: ["404 Not Found", "Content-Type: application/json"],
              payload: { error: "Contract not found" },
            };
          }

          return {
            route: `${spec.method} ${spec.path}`,
            meta: ["200 OK", "Content-Type: application/json", "IndexedDB read"],
            payload: selectedContract,
          };
        }

        if (endpointId === "contracts-post") {
          const nextContract = {
            ...createEmptyContractDraft(),
            ...body,
            managingTeam: { ...createEmptyContractDraft().managingTeam, ...(body.managingTeam || {}) },
            financials: { ...createEmptyContractDraft().financials, ...(body.financials || {}) },
            fleet: { ...createEmptyContractDraft().fleet, ...(body.fleet || {}) },
            documents: { ...createEmptyContractDraft().documents, ...(body.documents || {}) },
            widgets: Array.isArray(body.widgets) ? body.widgets : [],
            pdfSimulation: { ...createEmptyContractDraft().pdfSimulation, ...(body.pdfSimulation || {}) },
          };

          state.contracts.unshift(nextContract);
          state.selectedContractId = nextContract.id;
          await commitApiMutation();
          return {
            route: `${spec.method} ${spec.path}`,
            meta: ["201 Created", "Content-Type: application/json", "IndexedDB write"],
            payload: hydrateContract(nextContract),
          };
        }

        if (endpointId === "contracts-put") {
          const targetId = selectedContract?.id || body.id;
          const contractIndex = state.contracts.findIndex((contract) => contract.id === targetId);
          if (contractIndex === -1) {
            return {
              route: `${spec.method} ${spec.path}`,
              meta: ["404 Not Found", "Content-Type: application/json"],
              payload: { error: "Contract not found" },
            };
          }

          const currentContract = state.contracts[contractIndex];
          const updatedContract = {
            ...currentContract,
            ...body,
            managingTeam: { ...currentContract.managingTeam, ...(body.managingTeam || {}) },
            financials: { ...currentContract.financials, ...(body.financials || {}) },
            fleet: { ...currentContract.fleet, ...(body.fleet || {}) },
            documents: { ...currentContract.documents, ...(body.documents || {}) },
            widgets: Array.isArray(body.widgets) ? body.widgets : currentContract.widgets,
            pdfSimulation: { ...currentContract.pdfSimulation, ...(body.pdfSimulation || {}) },
          };

          state.contracts[contractIndex] = updatedContract;
          await commitApiMutation();
          return {
            route: `${spec.method} ${spec.path}`,
            meta: ["200 OK", "Content-Type: application/json", "IndexedDB write"],
            payload: hydrateContract(updatedContract),
          };
        }

        if (endpointId === "customers-get") {
          return {
            route: `${spec.method} ${spec.path}`,
            meta: ["200 OK", "Content-Type: application/json", "IndexedDB read"],
            payload: {
              count: state.customers.length,
              customers: state.customers,
            },
          };
        }

        if (endpointId === "customers-post") {
          const nextCustomer = {
            id: body.id || `CUST-${String(state.customers.length + 1).padStart(3, "0")}`,
            name: body.name || "",
            accountCode: body.accountCode || "",
            country: body.country || "",
          };
          state.customers.push(nextCustomer);
          await commitApiMutation();
          return {
            route: `${spec.method} ${spec.path}`,
            meta: ["201 Created", "Content-Type: application/json", "IndexedDB write"],
            payload: nextCustomer,
          };
        }

        if (endpointId === "customers-put") {
          const targetId = body.id || state.customers[0]?.id;
          const customerIndex = state.customers.findIndex((customer) => customer.id === targetId);
          if (customerIndex === -1) {
            return {
              route: `${spec.method} ${spec.path}`,
              meta: ["404 Not Found", "Content-Type: application/json"],
              payload: { error: "Customer not found" },
            };
          }
          state.customers[customerIndex] = {
            ...state.customers[customerIndex],
            ...body,
          };
          await commitApiMutation();
          return {
            route: `${spec.method} ${spec.path}`,
            meta: ["200 OK", "Content-Type: application/json", "IndexedDB write"],
            payload: state.customers[customerIndex],
          };
        }

        if (endpointId === "dataset-get") {
          return {
            route: `${spec.method} ${spec.path}`,
            meta: ["200 OK", "Content-Type: application/json", "IndexedDB read"],
            payload: getDatasetSnapshotWithHydration(),
          };
        }

        const referentialMatch = endpointId.match(/^referential-(.+)-(get|put)$/);
        if (referentialMatch) {
          const [, referentialKey, action] = referentialMatch;
          if (action === "get") {
            return {
              route: `${spec.method} ${spec.path}`,
              meta: ["200 OK", "Content-Type: application/json", "IndexedDB read"],
              payload: {
                key: referentialKey,
                values: state.lists[referentialKey] || [],
              },
            };
          }

          const nextValues = Array.isArray(body) ? body : Array.isArray(body.values) ? body.values : [];
          state.lists[referentialKey] = nextValues;
          await commitApiMutation();
          return {
            route: `${spec.method} ${spec.path}`,
            meta: ["200 OK", "Content-Type: application/json", "IndexedDB write"],
            payload: {
              key: referentialKey,
              values: state.lists[referentialKey],
            },
          };
        }

        return {
          route: `${spec.method} ${spec.path}`,
          meta: ["400 Bad Request", "Content-Type: application/json"],
          payload: { error: "Unsupported route" },
        };
      }

      function renderSelectOptions(options, selectedValue) {
        return options
          .map((option) => {
            const value = typeof option === "string" ? option : option.value;
            const label = typeof option === "string" ? option : option.label;
            const selected = String(value) === String(selectedValue) ? " selected" : "";
            return `<option value="${escapeHtml(value)}"${selected}>${escapeHtml(label)}</option>`;
          })
          .join("");
      }

      function getValueByPath(object, path) {
        return path.split(".").reduce((current, segment) => current?.[segment], object);
      }

      function setValueByPath(object, path, value) {
        const segments = path.split(".");
        const last = segments.pop();
        const target = segments.reduce((current, segment) => current?.[segment], object);

        if (!target || !last) {
          return false;
        }

        target[last] = value;
        return true;
      }

      function parseTextList(value) {
        return value
          .split(",")
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function parseNumberList(value) {
        return parseTextList(value)
          .map((item) => Number(item))
          .filter((item) => Number.isFinite(item));
      }

      function parseTableItems(value) {
        return value
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => {
            const [label, ...rest] = line.split(":");
            return {
              label: (label || "").trim(),
              value: rest.join(":").trim(),
            };
          })
          .filter((item) => item.label);
      }

      function getCurrentModalContract() {
        if (state.draftContract) {
          return state.draftContract;
        }
        const contract = state.contracts.find((item) => item.id === state.selectedContractId) || null;
        return contract;
      }

      function getHydratedModalContract() {
        return hydrateContract(getCurrentModalContract());
      }

      function nextContractId() {
        const currentYear = new Date().getFullYear();
        const yearContracts = state.contracts.filter((contract) => String(contract.id || "").startsWith(`CTR-${currentYear}-`));
        const maxSuffix = yearContracts.reduce((max, contract) => {
          const value = Number(String(contract.id).split("-").pop());
          return Number.isFinite(value) ? Math.max(max, value) : max;
        }, 0);
        return `CTR-${currentYear}-${String(maxSuffix + 1).padStart(3, "0")}`;
      }

      function createEmptyContractDraft() {
        const firstCustomer = state.customers[0];
        const today = new Date().toISOString().slice(0, 10);
        const nextYear = new Date(new Date().setFullYear(new Date().getFullYear() + 1)).toISOString().slice(0, 10);
        return {
          id: nextContractId(),
          name: "",
          type: getListOptions("contractTypes")[0] || "",
          customerId: firstCustomer?.id || "",
          region: getListOptions("regions")[0] || "",
          status: getListOptions("contractStatuses")[1] || "Brouillon",
          startDate: today,
          endDate: nextYear,
          globalValidationStatus: getListOptions("validationStatuses")[0] || "À vérifier",
          managingTeam: {
            name: "",
            company: getListOptions("managingCompanies")[0] || "",
            contact: "",
            email: "",
            phone: "",
          },
          financials: {
            currency: getListOptions("currencies")[0] || "EUR",
            billingModel: getListOptions("billingModels")[0] || "",
            estimatedAnnualValue: 0,
            rateRevision: "",
          },
          fleet: {
            program: getListOptions("programs")[0] || "",
            enginesCovered: 0,
            aircraftCovered: 0,
            base: "",
          },
          documents: {
            sourcePdf: "",
            summaryAi: getListOptions("summaryStatuses")[1] || "",
            importantPages: [],
          },
          widgets: [],
          pdfSimulation: {
            title: "",
            pages: [],
          },
        };
      }

      function getRequiredFieldPaths() {
        return [
          "name",
          "type",
          "customerId",
          "region",
          "status",
          "startDate",
          "endDate",
          "managingTeam.name",
          "managingTeam.contact",
          "financials.currency",
          "financials.billingModel",
          "fleet.program",
        ];
      }

      function validateContractDraft(contract) {
        const requiredPaths = getRequiredFieldPaths();
        const missing = requiredPaths.filter((path) => {
          const value = getValueByPath(contract, path);
          if (typeof value === "number") {
            return Number.isNaN(value);
          }
          return !String(value ?? "").trim();
        });

        if (contract.startDate && contract.endDate && contract.startDate > contract.endDate) {
          missing.push("date-order");
        }

        return missing;
      }

      function updateContractField(path, rawValue, format) {
        const contract = getCurrentModalContract();
        if (!contract) {
          return;
        }

        let nextValue = rawValue;
        if (format === "number") {
          nextValue = Number(rawValue);
        }
        if (format === "number-list") {
          nextValue = parseNumberList(rawValue);
        }
        if (format === "paragraphs") {
          nextValue = rawValue
            .split("\n\n")
            .map((item) => item.trim())
            .filter(Boolean);
        }
        if (format === "table-items") {
          nextValue = parseTableItems(rawValue);
        }

        setValueByPath(contract, path, nextValue);
        state.contractFormErrors = validateContractDraft(contract);
      }

      function renderEditorField(spec, contract) {
        const value = getValueByPath(contract, spec.path);
        const fieldId = `field-${spec.path.replaceAll(".", "-")}`;
        const common = `id="${fieldId}" data-field-path="${escapeHtml(spec.path)}" data-field-format="${escapeHtml(spec.format || "string")}"`;
        const required = state.contractModalMode === "create" && getRequiredFieldPaths().includes(spec.path);
        const hasError = required && state.contractFormErrors.includes(spec.path);

        let control = "";
        if (spec.control === "select") {
          const options = spec.optionsKey === "customers"
            ? state.customers.map((customer) => ({
                value: customer.id,
                label: `${customer.name} · ${customer.accountCode} · ${customer.country}`,
              }))
            : getListOptions(spec.optionsKey);
          control = `<select ${common}>${renderSelectOptions(options, value)}</select>`;
        } else if (spec.control === "textarea") {
          const displayValue = Array.isArray(value)
            ? spec.format === "table-items"
              ? value.map((item) => `${item.label}: ${item.value}`).join("\n")
              : value.join("\n\n")
            : value ?? "";
          control = `<textarea ${common} rows="${spec.rows || 3}">${escapeHtml(displayValue)}</textarea>`;
        } else {
          const type = spec.control === "date" ? "date" : spec.control === "number" ? "number" : "text";
          control = `<input ${common} type="${type}" value="${escapeHtml(value ?? "")}" />`;
        }

        return `
          <label class="editor-field ${spec.span === "full" ? "span-full" : ""} ${hasError ? "has-error" : ""}" for="${fieldId}">
            <span>${escapeHtml(spec.label)}${required ? ' <em class="required-mark">*</em>' : ""}</span>
            ${control}
            ${hasError ? `<small class="field-error">Champ obligatoire</small>` : ""}
          </label>
        `;
      }

      function getContractTabIcon(title) {
        const icons = {
          "Informations générales": "folder",
          "Equipe gestionnaire": "users",
          "Finance": "wallet",
          "Flotte": "plane",
          "Documents": "fileText",
          "Widgets": "blocks",
          "Extraits PDF": "fileText",
        };
        return icons[title] || "folder";
      }

      function renderContractModalHeader(contract) {
        if (!contract) {
          elements.contractModalHeader.innerHTML = `<h2>Contrat</h2>`;
          return;
        }

        elements.contractModalHeader.innerHTML = `
          <div class="stack compact-stack">
            <div class="modal-head-topline">
              <h2>${state.contractModalMode === "create" ? "Nouveau contrat" : escapeHtml(contract.name || "Contrat")}</h2>
              <span class="pill ${widgetStatusClass(contract.globalValidationStatus)}">${escapeHtml(contract.globalValidationStatus || "À vérifier")}</span>
            </div>
            <div class="subtle">${escapeHtml(contract.id)} · ${escapeHtml(contract.type || "")}</div>
          </div>
        `;
      }

      function buildEditableContractModalHtml(contract) {

          return `<div class="empty">Aucun contrat</div>`;

        const pages = contract.pdfSimulation?.pages || [];
        const widgets = contract.widgets || [];

          {

              { label: "Client", path: "customerId", control: "select", optionsKey: "customers" },
              { label: "Région", path: "region", control: "select", optionsKey: "regions" },
              { label: "Statut", path: "status", control: "select", optionsKey: "contractStatuses" },
              { label: "Validation globale", path: "globalValidationStatus", control: "select", optionsKey: "validationStatuses" },
              { label: "Début", path: "startDate", control: "date" },
              { label: "Fin", path: "endDate", control: "date" },
            ],
          },
          {
            title: "Equipe gestionnaire",
            fields: [
              { label: "Equipe", path: "managingTeam.name" },
              { label: "Contact", path: "managingTeam.contact" },
              { label: "Email", path: "managingTeam.email" },
              { label: "Téléphone", path: "managingTeam.phone" },
              { label: "Société", path: "managingTeam.company", control: "select", optionsKey: "managingCompanies" },
            ],

          {

              { label: "Valeur annuelle estimée", path: "financials.estimatedAnnualValue", control: "number", format: "number" },
              { label: "Devise", path: "financials.currency", control: "select", optionsKey: "currencies" },
              { label: "Facturation", path: "financials.billingModel", control: "select", optionsKey: "billingModels" },
              { label: "Révision tarifaire", path: "financials.rateRevision" },
            ],
          },
          {
            title: "Flotte",
            fields: [
              { label: "Programme", path: "fleet.program", control: "select", optionsKey: "programs" },
              { label: "Moteurs couverts", path: "fleet.enginesCovered", control: "number", format: "number" },
              { label: "Avions couverts", path: "fleet.aircraftCovered", control: "number", format: "number" },
              { label: "Base", path: "fleet.base" },
            ],
          },
          {
            title: "Documents",
            fields: [
              { label: "PDF source", path: "documents.sourcePdf" },
              { label: "Résumé IA", path: "documents.summaryAi", control: "select", optionsKey: "summaryStatuses" },
              { label: "Pages importantes", path: "documents.importantPages", control: "textarea", format: "number-list", rows: 3, span: "full" },
            ],
          },
          {
            title: "Widgets",
            widgetSection: true,
          },
          {
            title: "Extraits PDF",
            pdfSection: true,
          },
        ];
        const activeTab = sections.some((section) => section.title === state.contractModalTab)
          ? state.contractModalTab
          : sections[0].title;

        return `
          <article class="contract-sheet">
            <div class="modal-tabs" role="tablist" aria-label="Navigation contrat">
              ${sections
                .map(
                  (section) => `
                    <button
                      class="modal-tab-button ${section.title === activeTab ? "active" : ""}"
                      type="button"
                      role="tab"
                      aria-selected="${section.title === activeTab ? "true" : "false"}"
                      data-contract-tab="${escapeHtml(section.title)}"
                    >
                      <span data-lucide="${getContractTabIcon(section.title)}"></span>
                      ${escapeHtml(section.title)}
                    </button>
                  `
                )
                .join("")}
            </div>

            ${sections
              .map(
                (section) => `
                  <div class="sheet-section ${section.title === activeTab ? "" : "hidden"}" data-contract-tab-panel="${escapeHtml(section.title)}">
                    <h4>${escapeHtml(section.title)}</h4>
                    ${
                      section.widgetSection
                        ? `
                          <div class="widget-list">

      function bindContractModalEditor(root) {
        root.querySelectorAll("[data-contract-tab]").forEach((node) => {
          node.addEventListener("click", () => {
            state.contractModalTab = node.dataset.contractTab;
            const contract = getHydratedModalContract();
            renderContractModalHeader(contract);
            elements.contractModalContent.innerHTML = buildEditableContractModalHtml(contract);
            bindContractModalEditor(elements.contractModalContent);
            renderIcons(elements.contractModal);
          });
        });

        const cancelButton = root.querySelector("[data-contract-cancel]");
        if (cancelButton) {
          cancelButton.addEventListener("click", () => {
            closeContractModal();
          });
        }

        const deleteButton = root.querySelector("[data-contract-delete]");
        if (deleteButton) {
          deleteButton.addEventListener("click", () => {
            const contractId = state.selectedContractId;
            const contractIndex = state.contracts.findIndex((contract) => contract.id === contractId);
            if (contractIndex < 0) {
              return;
            }

            state.contracts.splice(contractIndex, 1);
            state.selectedContractId = state.contracts[0]?.id || null;
            state.draftContract = null;
            state.contractFormErrors = [];
            state.contractModalMode = "edit";
            state.contractModalTab = "Informations générales";
            scheduleDatasetPersist();
            closeContractModal();
            render();
          });
        }

        const submitButton = root.querySelector("[data-contract-submit]");
        if (submitButton) {
          submitButton.addEventListener("click", () => {
            const errors = validateContractDraft(state.draftContract);
            state.contractFormErrors = errors;
            if (errors.length) {
              const contract = getHydratedModalContract();
              renderContractModalHeader(contract);
              elements.contractModalContent.innerHTML = buildEditableContractModalHtml(contract);
              bindContractModalEditor(elements.contractModalContent);
              renderIcons(elements.contractModal);
              return;
            }

            if (state.contractModalMode === "create") {
              state.contracts.unshift(structuredClone(state.draftContract));
              state.selectedContractId = state.draftContract.id;
            } else {
              const contractIndex = state.contracts.findIndex((contract) => contract.id === state.selectedContractId);
              if (contractIndex >= 0) {
                state.contracts[contractIndex] = structuredClone(state.draftContract);
              }
            }
            state.draftContract = null;
            state.contractFormErrors = [];
            state.contractModalMode = "edit";
            state.contractModalTab = "Informations générales";
            scheduleDatasetPersist();
            render();
            openContractModal();
          });
        }

        root.querySelectorAll("[data-field-path]").forEach((node) => {
          const update = () => {
            updateContractField(node.dataset.fieldPath, node.value, node.dataset.fieldFormat);
            const contract = getHydratedModalContract();
            renderContractModalHeader(contract);
            elements.contractModalContent.innerHTML = buildEditableContractModalHtml(contract);
            bindContractModalEditor(elements.contractModalContent);
            renderIcons(elements.contractModal);
          };

          node.addEventListener("change", update);
          if (node.tagName === "TEXTAREA" || node.tagName === "INPUT") {
            node.addEventListener("blur", update);
          }
        });
      }

      function bindContractsTableEvents() {
        elements.contractsList.querySelectorAll("[data-contract-id]").forEach((node) => {
          const selectContract = () => {
            state.selectedContractId = node.dataset.contractId;
            render();
            openContractModal();
          };

          node.addEventListener("click", selectContract);
          node.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              selectContract();
            }
          });
        });

        elements.contractsList.querySelectorAll("[data-column-filter]").forEach((node) => {
          const update = () => setColumnTextFilter(node.dataset.columnFilter, node.value);
          node.addEventListener("input", update);
          node.addEventListener("change", update);
          node.addEventListener("click", (event) => event.stopPropagation());
        });

        elements.contractsList.querySelectorAll("[data-filter-popover-toggle]").forEach((node) => {
          node.addEventListener("click", (event) => {
            event.stopPropagation();
            const key = node.dataset.filterPopoverToggle;
            state.activeHeaderPopover = state.activeHeaderPopover === key ? null : key;
            state.popoverSearch = "";
            renderContractsList();
          });
        });

        elements.contractsList.querySelectorAll("[data-filter-search]").forEach((node) => {
          node.addEventListener("input", (event) => {
            event.stopPropagation();
            const key = node.dataset.filterSearch;
            if (["reference", "contract"].includes(key)) {
              setColumnTextFilter(key, node.value);
              return;
            }
            state.popoverSearch = node.value;
            renderContractsList();
          });
          node.addEventListener("click", (event) => event.stopPropagation());
        });

        elements.contractsList.querySelectorAll("[data-filter-option]").forEach((node) => {
          node.addEventListener("change", (event) => {
            event.stopPropagation();
            toggleColumnSelectedValue(node.dataset.filterOption, node.value);
          });
          node.addEventListener("click", (event) => event.stopPropagation());
        });

        elements.contractsList.querySelectorAll("[data-filter-reset]").forEach((node) => {
          node.addEventListener("click", (event) => {
            event.stopPropagation();
            const key = node.dataset.filterReset;
            state.columnFilters[key] = ["reference", "contract"].includes(key)
              ? { text: "" }
              : { text: "", selected: [] };
            state.popoverSearch = "";
            render();
          });
        });

        const toggleHeaderFiltersButton = elements.contractsList.querySelector("#toggleHeaderFiltersButton");
        if (toggleHeaderFiltersButton) {
          toggleHeaderFiltersButton.addEventListener("click", () => {
            state.headerFiltersOpen = !state.headerFiltersOpen;
            renderContractsList();
          });
        }

        const clearHeaderFiltersButton = elements.contractsList.querySelector("#clearHeaderFiltersButton");
        if (clearHeaderFiltersButton) {
          clearHeaderFiltersButton.addEventListener("click", () => {
            clearAllColumnFilters();
            render();
          });
        }
      }

      function renderApiConsole() {

        const apiState = state.apiResponseState || {
          route: `${current.method} ${current.path}`,
          meta: ["Ready", "Awaiting request"],
          payload: {},
        };
        const showContractSelector = ["contracts-get-one", "contracts-put"].includes(state.apiEndpoint);
        const splitterWidth = localStorage.getItem("apiConsoleResponseWidth") || "58%";

        elements.apiConsoleContent.innerHTML = `
          <div class="api-explorer" id="apiExplorer" style="--api-response-width:${escapeHtml(splitterWidth)};">
            <section class="api-panel api-response-panel">
              <div class="api-panel-head">
                <div class="stack compact-stack">
                  <h3>Response body</h3>
                </div>
                <div class="console-meta">${apiState.meta.map((item) => `<span class="tag">${escapeHtml(item)}</span>`).join("")}</div>
              </div>
                <div class="api-panel-body">

                  <p>${escapeHtml(current.responseDescription)}</p>

                      <thead>
                        <tr>
                          <th>Key</th>

                          <th>Required</th>
                          <th>Notes</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${renderApiDefinitionRows(current.responseDefinition)}

                    </table>

                </details>
                <div class="api-body-card">
                  <div class="api-section-title">Body sample</div>
                  <pre class="api-pre"><code>${escapeHtml(JSON.stringify(apiState.payload, null, 2))}</code></pre>

              </div>
            </section>

            <div class="api-splitter" id="apiSplitter" aria-hidden="true"></div>

            <section class="api-panel api-request-panel">
              <div class="api-panel-head">
                <div class="stack compact-stack">
                  <h3>Request</h3>
                </div>
              </div>
              <div class="api-panel-body">
                <label class="editor-field" for="apiRoute">
                  <span>Route object</span>
                  <select id="apiRoute">
                    ${Object.values(specs)
                      .map(
                        (endpoint) => `
                          <option value="${escapeHtml(endpoint.id)}"${endpoint.id === state.apiEndpoint ? " selected" : ""}>
                            ${escapeHtml(`${endpoint.label} · ${endpoint.method} ${endpoint.path}`)}
                          </option>
                        `
                      )
                      .join("")}
                  </select>
                </label>

                <div class="api-method-route">
                  <div class="api-method-badge">${escapeHtml(current.method)}</div>
                  <div class="api-route-box">${escapeHtml(current.path)}</div>
                </div>

                ${
                  showContractSelector
                    ? `
                      <label class="editor-field" for="apiContractSelectInline">
                        <span>Contrat</span>
                        <select id="apiContractSelectInline">
                          <option value="">Contrat sélectionné</option>
                          ${state.contracts
                            .map(
                              (contract) => `
                                <option value="${escapeHtml(contract.id)}"${contract.id === state.selectedContractId ? " selected" : ""}>
                                  ${escapeHtml(`${contract.id} · ${contract.name}`)}
                                </option>
                              `
                            )
                            .join("")}
                        </select>
                      </label>
                    `
                    : ""
                }

                <details class="api-definition-card">
                  <summary class="api-definition-summary">
                    <span class="api-section-title">Request definition</span>
                    <span class="api-definition-title">${escapeHtml(current.requestName)}</span>
                  </summary>
                  <p>${escapeHtml(current.requestDescription)}</p>
                  <div class="referentials-table-wrap">
                    <table class="referentials-table api-definition-table">
                      <thead>
                        <tr>
                          <th>Key</th>
                          <th>Format</th>
                          <th>Required</th>
                          <th>Notes</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${renderApiDefinitionRows(current.requestDefinition)}
                      </tbody>
                    </table>
                  </div>
                </details>

                <div class="api-body-card">
                  <div class="api-section-title">Body sample</div>
                  <textarea id="apiRequestBody" class="api-request-textarea">${escapeHtml(state.apiRequestDrafts[current.id] || getApiDefaultDraft(current))}</textarea>
                </div>

                <div class="api-request-actions">
                  <button class="action-button" type="button" id="apiSendButton">Send request</button>
                </div>
              </div>
            </section>
          </div>
        `;

        const endpointSelect = document.getElementById("apiRoute");
        if (endpointSelect) {
          endpointSelect.addEventListener("change", () => {
            state.apiEndpoint = endpointSelect.value;
            state.apiResponseState = null;
            renderApiConsole();
          });
        }

        const requestBody = document.getElementById("apiRequestBody");
        if (requestBody) {
          requestBody.addEventListener("input", () => {
            state.apiRequestDrafts[current.id] = requestBody.value;
          });
        }

        const contractSelect = document.getElementById("apiContractSelectInline");
        if (contractSelect) {
          contractSelect.addEventListener("change", () => {
            state.selectedContractId = contractSelect.value || state.contracts[0]?.id || null;
            state.apiResponseState = null;
            render();
          });
        }

        const sendButton = document.getElementById("apiSendButton");
        if (sendButton) {
          sendButton.addEventListener("click", async () => {
            try {
              if (requestBody) {
                state.apiRequestDrafts[current.id] = requestBody.value;
              }
              state.apiResponseState = await executeApiRequest(current.id);
              render();
            } catch (error) {
              state.apiResponseState = {
                route: `${current.method} ${current.path}`,
                meta: ["400 Bad Request", "Invalid JSON body"],
                payload: { error: error.message },
              };
              renderApiConsole();
            }
          });
        }

        const splitter = document.getElementById("apiSplitter");
        const explorer = document.getElementById("apiExplorer");
        if (splitter && explorer) {
          splitter.addEventListener("pointerdown", (event) => {
            event.preventDefault();
            splitter.setPointerCapture(event.pointerId);
            const rect = explorer.getBoundingClientRect();

            const onMove = (moveEvent) => {
              const raw = ((moveEvent.clientX - rect.left) / rect.width) * 100;
              const next = Math.min(75, Math.max(25, raw));
              explorer.style.setProperty("--api-response-width", `${next}%`);
              localStorage.setItem("apiConsoleResponseWidth", `${next}%`);
            };

            const stop = () => {
              splitter.removeEventListener("pointermove", onMove);
              splitter.removeEventListener("pointerup", stop);
              splitter.removeEventListener("lostpointercapture", stop);
            };

            splitter.addEventListener("pointermove", onMove);
            splitter.addEventListener("pointerup", stop);
            splitter.addEventListener("lostpointercapture", stop);
          });
        }
      }

          state.activeReferentialTab = tabs[0];
        }

        const isCustomers = activeKey === "customers";

        elements.referentialsCount.textContent = `${tabs.length} référentiels`;

        elements.referentialsContent.innerHTML = `

                      data-referential-tab="${escapeHtml(key)}"
                    >
                      <span data-lucide="${escapeHtml(presentation.icon)}"></span>
                      ${escapeHtml(presentation.label)}
                    </button>
                  `
                  }
                )
                .join("")}
            </div>
            <div class="referentials-card">
              <div class="referentials-toolbar">
                <div class="subtle">${escapeHtml(activePresentation.label)} · ${values.length} entrées</div>
                <button class="action-button" type="button" data-referential-add>${isCustomers ? "Ajouter un client" : "Ajouter une valeur"}</button>
              </div>
              ${
                isCustomers
                  ? `
                    <div class="referentials-table-wrap">
                      <table class="referentials-table">
                        <thead>
                          <tr>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Code compte</th>
                            <th>Pays</th>
