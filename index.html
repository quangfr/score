<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contrats</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">Contrathèque</div>
        <nav class="nav">
          <div class="nav-group-label">Navigation</div>
          <button class="nav-item active" type="button" data-view="contracts">Contrats</button>
          <button class="nav-item" type="button" data-view="docs">Docs</button>
          <div class="nav-group-label">Outils</div>
          <button class="nav-item" type="button" data-view="api">Console API</button>
        </nav>
      </aside>

      <main class="main">
        <section id="contractsView" class="panel">
          <div class="panel-head">
            <h1>Contrats</h1>
            <div class="panel-head-actions">
              <span id="contractsCount" class="subtle"></span>
              <div id="filterModeSwitch" class="segment-control" aria-label="Modes de filtre">
                <button class="segment-button active" type="button" data-filter-mode="1">1</button>
                <button class="segment-button" type="button" data-filter-mode="2">2</button>
                <button class="segment-button" type="button" data-filter-mode="3">3</button>
              </div>
            </div>
          </div>

          <div class="filters hidden" aria-hidden="true">
            <input id="searchInput" type="search" placeholder="Rechercher" />
            <select id="statusFilter">
              <option value="">Statut</option>
            </select>
            <select id="typeFilter">
              <option value="">Type</option>
            </select>
          </div>

          <div id="contractsList" class="contracts-table-shell"></div>
        </section>

        <section id="docsView" class="panel docs-panel hidden">
          <div class="panel-head">
            <h1>Docs</h1>
            <span class="subtle">Documentation technique, fonctionnelle et architecture de données</span>
          </div>
          <div class="docs-content">
            <div id="docsContent" class="docs-shell docs-prose"></div>
          </div>
        </section>
      </main>

      <aside id="previewSidebar" class="preview-sidebar hidden">
        <div id="previewResizer" class="preview-resizer" aria-hidden="true"></div>
        <section id="previewPanel" class="preview-panel">
          <div class="preview-head">
            <h2>Prévisualisation</h2>
            <button id="openPreviewModalButton" class="icon-button" type="button" aria-label="Ouvrir en plein écran">
              <span data-lucide="fullscreen"></span>
            </button>
          </div>
          <div id="contractPreview" class="preview-content"></div>
        </section>

        <section id="apiConsole" class="console-panel hidden">
          <div class="console-head">
            <h2>Console API</h2>
          </div>
          <div class="console-content">
            <div class="console-toolbar">
              <div id="apiEndpointButtons" class="console-actions"></div>
              <div id="apiRoute" class="console-route"></div>
              <div class="console-actions">
                <select id="apiContractSelect">
                  <option value="">Contrat</option>
                </select>
              </div>
              <div id="apiMeta" class="console-meta"></div>
            </div>
            <pre id="jsonPayload"></pre>
          </div>
        </section>
      </aside>
    </div>

    <div id="contractModal" class="modal" aria-hidden="true">
      <div class="modal-body">
        <div class="modal-head">
          <h2>Contrat</h2>
          <button id="closeContractModalButton" class="icon-button" type="button" aria-label="Fermer">
            <span data-lucide="x"></span>
          </button>
        </div>
        <div id="contractModalContent" class="modal-content"></div>
      </div>
    </div>

    <script type="module">
      import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

      mermaid.initialize({
        startOnLoad: false,
        theme: "neutral",
        securityLevel: "loose",
      });

      const state = {
        customers: [],
        contracts: [],
        filteredContracts: [],
        selectedContractId: null,
        apiEndpoint: "list",
        activeView: "contracts",
        docsMarkdown: "",
        filterMode: "1",
        headerFiltersOpen: false,
        activeHeaderPopover: null,
        popoverSearch: "",
        columnFilters: {
          reference: { text: "" },
          contract: { text: "" },
          client: { text: "", selected: [] },
          type: { text: "", selected: [] },
          region: { text: "", selected: [] },
          status: { text: "", selected: [] },
        },
      };

      const elements = {
        appShell: document.querySelector(".app-shell"),
        navItems: [...document.querySelectorAll("[data-view]")],
        contractsView: document.getElementById("contractsView"),
        docsView: document.getElementById("docsView"),
        searchInput: document.getElementById("searchInput"),
        statusFilter: document.getElementById("statusFilter"),
        typeFilter: document.getElementById("typeFilter"),
        contractsCount: document.getElementById("contractsCount"),
        contractsList: document.getElementById("contractsList"),
        filterModeSwitch: document.getElementById("filterModeSwitch"),
        contractPreview: document.getElementById("contractPreview"),
        jsonPayload: document.getElementById("jsonPayload"),
        apiEndpointButtons: document.getElementById("apiEndpointButtons"),
        apiContractSelect: document.getElementById("apiContractSelect"),
        apiRoute: document.getElementById("apiRoute"),
        apiMeta: document.getElementById("apiMeta"),
        apiConsole: document.getElementById("apiConsole"),
        openPreviewModalButton: document.getElementById("openPreviewModalButton"),
        closeContractModalButton: document.getElementById("closeContractModalButton"),
        contractModal: document.getElementById("contractModal"),
        contractModalContent: document.getElementById("contractModalContent"),
        previewResizer: document.getElementById("previewResizer"),
        previewSidebar: document.getElementById("previewSidebar"),
        previewPanel: document.getElementById("previewPanel"),
        docsContent: document.getElementById("docsContent"),
      };

      const lucideIcons = {
        fullscreen: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 3H5a2 2 0 0 0-2 2v3"></path>
            <path d="M16 3h3a2 2 0 0 1 2 2v3"></path>
            <path d="M8 21H5a2 2 0 0 1-2-2v-3"></path>
            <path d="M16 21h3a2 2 0 0 0 2-2v-3"></path>
          </svg>
        `,
        x: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        `,
        filter: `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22 3H2l8 9.46V19l4 2v-8.54z"></path>
          </svg>
        `,
      };

      const formatDate = (value) =>
        new Intl.DateTimeFormat("fr-FR", {
          year: "numeric",
          month: "short",
          day: "numeric",
        }).format(new Date(value));

      const formatCurrency = (value, currency) =>
        new Intl.NumberFormat("fr-FR", {
          style: "currency",
          currency,
          maximumFractionDigits: 0,
        }).format(value);

      const escapeHtml = (value) =>
        String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");

      const inlineMarkdown = (value) =>
        escapeHtml(value)
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');

      function renderIcons(root = document) {
        root.querySelectorAll("[data-lucide]").forEach((node) => {
          const iconName = node.dataset.lucide;
          node.innerHTML = lucideIcons[iconName] || "";
        });
      }

      function widgetStatusClass(status) {
        return ["Valid", "Closed"].includes(status) ? "status-valid" : "status-warning";
      }

      function buildOptions(select, values) {
        const baseLabel = select === elements.statusFilter ? "Statut" : "Type";
        select.innerHTML = `<option value="">${baseLabel}</option>${values
          .map((value) => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`)
          .join("")}`;
      }

      function buildContractSelectOptions() {
        elements.apiContractSelect.innerHTML = `
          <option value="">Contrat sélectionné</option>
          ${state.contracts
            .map(
              (contract) => `
                <option value="${escapeHtml(contract.id)}">${escapeHtml(contract.id)} · ${escapeHtml(contract.name)}</option>
              `
            )
          .join("")}
        `;
      }

      function getFilterOptions(key) {
        const valuesByKey = {
          client: [...new Set(state.contracts.map((contract) => hydrateContract(contract)?.customer.name).filter(Boolean))],
          type: [...new Set(state.contracts.map((contract) => contract.type).filter(Boolean))],
          region: [...new Set(state.contracts.map((contract) => contract.region).filter(Boolean))],
          status: [...new Set(state.contracts.map((contract) => contract.globalValidationStatus).filter(Boolean))],
        };

        return (valuesByKey[key] || []).sort((a, b) => a.localeCompare(b, "fr"));
      }

      function getColumnFilterValue(key) {
        return state.columnFilters[key] || { text: "", selected: [] };
      }

      function setColumnTextFilter(key, value) {
        state.columnFilters[key] = {
          ...getColumnFilterValue(key),
          text: value,
        };
        render();
      }

      function toggleColumnSelectedValue(key, value) {
        const current = getColumnFilterValue(key);
        const selected = new Set(current.selected || []);
        if (selected.has(value)) {
          selected.delete(value);
        } else {
          selected.add(value);
        }
        state.columnFilters[key] = {
          ...current,
          selected: [...selected],
        };
        render();
      }

      function clearAllColumnFilters() {
        state.columnFilters = {
          reference: { text: "" },
          contract: { text: "" },
          client: { text: "", selected: [] },
          type: { text: "", selected: [] },
          region: { text: "", selected: [] },
          status: { text: "", selected: [] },
        };
        state.popoverSearch = "";
      }

      function renderFilterControl(key, label, type = "text") {
        const value = getColumnFilterValue(key);
        if (type === "select") {
          return `
            <select data-column-filter="${key}" aria-label="${escapeHtml(label)}">
              <option value="">Tous</option>
              ${getFilterOptions(key)
                .map((option) => `<option value="${escapeHtml(option)}"${option === value.text ? " selected" : ""}>${escapeHtml(option)}</option>`)
                .join("")}
            </select>
          `;
        }

        return `
          <input
            data-column-filter="${key}"
            type="search"
            value="${escapeHtml(value.text || "")}"
            placeholder="${escapeHtml(label)}"
            aria-label="${escapeHtml(label)}"
          />
        `;
      }

      function hasActiveFilter(key) {
        const value = getColumnFilterValue(key);
        return Boolean(value.text) || Boolean((value.selected || []).length);
      }

      function renderPopoverFilter(key, label, mode = "text") {
        const isOpen = state.activeHeaderPopover === key;
        const hasValue = hasActiveFilter(key);
        const current = getColumnFilterValue(key);
        const options = getFilterOptions(key).filter((option) =>
          option.toLowerCase().includes(state.popoverSearch.toLowerCase())
        );
        return `
          <div class="header-popover-slot">
            <button
              class="header-filter-button${hasValue ? " is-active" : ""}"
              type="button"
              data-filter-popover-toggle="${key}"
              aria-expanded="${isOpen ? "true" : "false"}"
              aria-label="Filtrer ${escapeHtml(label)}"
            >
              <span data-lucide="filter"></span>
            </button>
            ${
              isOpen
                ? `
                  <div class="header-popover" data-filter-popover="${key}">
                    <div class="header-popover-title">${escapeHtml(label)}</div>
                    <input
                      type="search"
                      value="${escapeHtml(mode === "text" ? current.text || "" : state.popoverSearch)}"
                      placeholder="Rechercher"
                      data-filter-search="${key}"
                      aria-label="Rechercher dans ${escapeHtml(label)}"
                    />
                    <button class="popover-reset-button" type="button" data-filter-reset="${key}">Réinitialiser</button>
                    ${
                      mode === "multi"
                        ? `
                          <div class="header-checklist">
                            ${options.length
                              ? options
                                  .map(
                                    (option) => `
                                      <label class="check-option">
                                        <input
                                          type="checkbox"
                                          data-filter-option="${key}"
                                          value="${escapeHtml(option)}"
                                          ${(current.selected || []).includes(option) ? "checked" : ""}
                                        />
                                        <span>${escapeHtml(option)}</span>
                                      </label>
                                    `
                                  )
                                  .join("")
                              : `<div class="subtle">Aucun résultat</div>`}
                          </div>
                        `
                        : ""
                    }
                  </div>
                `
                : ""
            }
          </div>
        `;
      }

      function renderHeaderFilters() {
        const visibleInline = state.filterMode === "1" || (state.filterMode === "3" && state.headerFiltersOpen);
        if (!visibleInline) {
          return "";
        }

        return `
          <tr class="contracts-filter-row">
            <th>${renderFilterControl("reference", "Référence")}</th>
            <th>${renderFilterControl("contract", "Contrat")}</th>
            <th>${renderFilterControl("client", "Client")}</th>
            <th>${renderFilterControl("type", "Type", "select")}</th>
            <th>${renderFilterControl("region", "Région", "select")}</th>
            <th></th>
            <th>${renderFilterControl("status", "Statut", "select")}</th>
          </tr>
        `;
      }

      function getCustomerById(customerId) {
        return state.customers.find((customer) => customer.id === customerId) || null;
      }

      function hydrateContract(contract) {
        if (!contract) {
          return null;
        }

        const customer = getCustomerById(contract.customerId) || {
          id: "",
          name: "Client inconnu",
          accountCode: "",
          country: "",
        };

        return {
          ...contract,
          customer,
        };
      }

      function getSelectedContract() {
        const contract = state.contracts.find((item) => item.id === state.selectedContractId) || state.filteredContracts[0] || null;
        return hydrateContract(contract);
      }

      function getApiContract() {
        const contract = state.contracts.find((item) => item.id === state.selectedContractId) || state.contracts[0] || null;
        return hydrateContract(contract);
      }

      function formatLabel(value) {
        return String(value)
          .replaceAll(/([a-z0-9])([A-Z])/g, "$1 $2")
          .replaceAll("_", " ")
          .replaceAll("-", " ")
          .replace(/\s+/g, " ")
          .trim()
          .replace(/^./, (char) => char.toUpperCase());
      }

      function renderKeyValueRows(entries) {
        return entries
          .map(
            ([label, value]) => `
              <div class="key-value">
                <span>${escapeHtml(label)}</span>
                <strong>${escapeHtml(value)}</strong>
              </div>
            `
          )
          .join("");
      }

      function renderWidgetData(widget) {
        if (!widget?.data) {
          return "";
        }

        if (widget.type === "table") {
          const items = Array.isArray(widget.data.items) ? widget.data.items : [];
          return `
            <div class="widget-table">
              ${items
                .map(
                  (item) => `
                    <div class="key-value">
                      <span>${escapeHtml(item.label)}</span>
                      <strong>${escapeHtml(item.value)}</strong>
                    </div>
                  `
                )
                .join("")}
            </div>
          `;
        }

        if (widget.type === "article") {
          const paragraphs = Array.isArray(widget.data.paragraphs) ? widget.data.paragraphs : [];
          return `
            <div class="widget-paragraphs">
              ${paragraphs.map((paragraph) => `<p>${escapeHtml(paragraph)}</p>`).join("")}
            </div>
          `;
        }

        return `
          <div class="widget-data-list">
            ${Object.entries(widget.data)
              .map(
                ([key, value]) => `
                  <div class="widget-data-row">
                    <span class="subtle">${escapeHtml(formatLabel(key))}</span>
                    <strong>${escapeHtml(value)}</strong>
                  </div>
                `
              )
              .join("")}
          </div>
        `;
      }

      function buildPreviewHtml(contract) {
        if (!contract) {
          return `<div class="empty">Aucun contrat</div>`;
        }

        const pages = contract.pdfSimulation?.pages || [];
        const widgets = contract.widgets || [];
        const metadataEntries = [
          ["Client", contract.customer.name],
          ["Code compte", contract.customer.accountCode],
          ["Pays", contract.customer.country],
          ["Région", contract.region],
          ["Période", `${formatDate(contract.startDate)} - ${formatDate(contract.endDate)}`],
          ["Statut contrat", contract.status],
          ["Équipe", contract.managingTeam.name],
          ["Contact", contract.managingTeam.contact],
          ["Email", contract.managingTeam.email],
          ["Téléphone", contract.managingTeam.phone],
          ["Société", contract.managingTeam.company],
        ];
        const financialEntries = [
          ["Valeur estimée", formatCurrency(contract.financials.estimatedAnnualValue, contract.financials.currency)],
          ["Devise", contract.financials.currency],
          ["Modèle de facturation", contract.financials.billingModel],
          ["Révision tarifaire", contract.financials.rateRevision],
        ];
        const fleetEntries = [
          ["Programme", contract.fleet.program],
          ["Moteurs couverts", String(contract.fleet.enginesCovered)],
          ["Avions couverts", String(contract.fleet.aircraftCovered)],
          ["Base", contract.fleet.base],
        ];
        const documentEntries = [
          ["PDF source", contract.documents.sourcePdf],
          ["Résumé IA", contract.documents.summaryAi],
          ["Pages importantes", (contract.documents.importantPages || []).join(", ")],
        ];

        return `
          <article class="contract-sheet">
            <div class="sheet-title-row">
              <div class="stack">
                <div class="subtle">${escapeHtml(contract.id)} · ${escapeHtml(contract.type)}</div>
                <h3>${escapeHtml(contract.name)}</h3>
              </div>
              <span class="pill ${widgetStatusClass(contract.globalValidationStatus)}">${escapeHtml(contract.globalValidationStatus)}</span>
            </div>

            <div class="preview-meta">
              <div class="subtle">Prévisualisation du contrat et de tous ses widgets</div>
              <span class="tag">${widgets.length} widget${widgets.length > 1 ? "s" : ""}</span>
            </div>

            <div class="sheet-section">
              <div class="customer-editor">
                <label for="customerSearchInput">Client du contrat</label>
                <div class="customer-editor-row">
                  <input
                    id="customerSearchInput"
                    type="search"
                    list="customersList"
                    value="${escapeHtml(contract.customer.name)}"
                    placeholder="Rechercher un client"
                  />
                  <button id="applyCustomerChangeButton" class="action-button" type="button">Mettre à jour</button>
                </div>
                <datalist id="customersList">
                  ${state.customers
                    .map(
                      (customer) => `
                        <option value="${escapeHtml(customer.name)}">${escapeHtml(customer.accountCode)} · ${escapeHtml(customer.country)}</option>
                      `
                    )
                    .join("")}
                </datalist>
                <div class="subtle">Table clients: ${state.customers.length} entrées référencées dans le dataset.</div>
              </div>
            </div>

            <div class="sheet-section">
              <div class="key-values">
                ${renderKeyValueRows(metadataEntries)}
              </div>
            </div>

            <div class="sheet-section">
              <h4>Finance</h4>
              <div class="key-values">
                ${renderKeyValueRows(financialEntries)}
              </div>
            </div>

            <div class="sheet-section">
              <h4>Flotte</h4>
              <div class="key-values">
                ${renderKeyValueRows(fleetEntries)}
              </div>
            </div>

            <div class="sheet-section">
              <h4>Documents</h4>
              <div class="key-values">
                ${renderKeyValueRows(documentEntries)}
              </div>
            </div>

            <div class="sheet-section">
              <h4>Widgets du contrat</h4>
              <div class="widget-list">
                ${widgets
                  .map(
                    (widget) => `
                      <article class="widget-card">
                        <div class="widget-head">
                          <div class="stack">
                            <h4>${escapeHtml(widget.name)}</h4>
                            <div class="subtle">${escapeHtml(widget.id)} · ${escapeHtml(widget.type)}</div>
                          </div>
                          <span class="pill ${widgetStatusClass(widget.status)}">${escapeHtml(widget.status)}</span>
                        </div>

                        <div class="widget-meta">
                          <div class="row"><span class="subtle">Dernier changement</span><strong>${escapeHtml(formatDate(widget.lastStatusChange))}</strong></div>
                          <div class="row"><span class="subtle">Accès lecture</span><strong>${escapeHtml(widget.readAccess)}</strong></div>
                          <div class="row"><span class="subtle">Accès édition</span><strong>${escapeHtml(widget.editAccess)}</strong></div>
                        </div>

                        ${renderWidgetData(widget)}
                      </article>
                    `
                  )
                  .join("")}
              </div>
            </div>

            ${
              pages.length
                ? `
                  <div class="sheet-section">
                    <h4>Extraits PDF</h4>
                    ${pages
                      .map(
                        (page) => `
                          <div class="preview-subsection">
                            <h4>${escapeHtml(page.heading)}</h4>
                            ${page.content.map((line) => `<p>${escapeHtml(line)}</p>`).join("")}
                          </div>
                        `
                      )
                      .join("")}
                  </div>
                `
                : ""
            }
          </article>
        `;
      }

      function bindPreviewResize() {
        const storageKey = "previewSidebarWidth";
        const minWidth = 360;
        const maxWidth = 760;

        const applyWidth = (width) => {
          const nextWidth = Math.min(maxWidth, Math.max(minWidth, width));
          document.documentElement.style.setProperty("--preview-width", `${nextWidth}px`);
          localStorage.setItem(storageKey, String(nextWidth));
        };

        const savedWidth = Number(localStorage.getItem(storageKey));
        if (savedWidth) {
          applyWidth(savedWidth);
        }

        let isResizing = false;

        const stopResize = () => {
          isResizing = false;
          document.body.style.userSelect = "";
          document.body.style.cursor = "";
        };

        const onPointerMove = (event) => {
          if (!isResizing || window.innerWidth <= 1180) {
            return;
          }

          applyWidth(window.innerWidth - event.clientX);
        };

        elements.previewResizer.addEventListener("pointerdown", (event) => {
          if (window.innerWidth <= 1180) {
            return;
          }

          isResizing = true;
          document.body.style.userSelect = "none";
          document.body.style.cursor = "col-resize";
          elements.previewResizer.setPointerCapture(event.pointerId);
        });

        elements.previewResizer.addEventListener("pointerup", stopResize);
        elements.previewResizer.addEventListener("lostpointercapture", stopResize);
        window.addEventListener("pointermove", onPointerMove);
        window.addEventListener("pointerup", stopResize);
      }

      function buildApiPayload() {
        const selectedContract = getApiContract();

        if (state.apiEndpoint === "detail") {
          if (!selectedContract) {
            return {
              route: "GET /api/contracts/:id",
              meta: ["404 Not Found", "Aucun contrat sélectionné"],
              payload: { error: "Contract not found" },
            };
          }

          return {
            route: `GET /api/contracts/${selectedContract.id}`,
            meta: ["200 OK", "Content-Type: application/json", "Export one contract"],
            payload: {
              exportVersion: "1.0",
              exportedAt: new Date().toISOString(),
              route: `/api/contracts/${selectedContract.id}`,
              contract: selectedContract,
            },
          };
        }

        if (state.apiEndpoint === "customers") {
          return {
            route: "GET /api/customers",
            meta: ["200 OK", "Content-Type: application/json", "Export customers table"],
            payload: {
              exportVersion: "1.0",
              exportedAt: new Date().toISOString(),
              route: "/api/customers",
              count: state.customers.length,
              customers: state.customers,
            },
          };
        }

        if (state.apiEndpoint === "dataset") {
          return {
            route: "GET /api/export/data.json",
            meta: ["200 OK", "Content-Type: application/json", "Export full dataset"],
            payload: {
              customers: state.customers,
              contracts: state.contracts,
            },
          };
        }

        return {
          route: "GET /api/contracts",
          meta: ["200 OK", "Content-Type: application/json", "Export contracts list"],
          payload: {
            exportVersion: "1.0",
            exportedAt: new Date().toISOString(),
            route: "/api/contracts",
            count: state.contracts.length,
            contracts: state.contracts.map((contract) => {
              const hydratedContract = hydrateContract(contract);
              return {
              id: contract.id,
              name: contract.name,
              type: contract.type,
              status: contract.status,
              globalValidationStatus: contract.globalValidationStatus,
              customer: hydratedContract.customer,
              region: contract.region,
              startDate: contract.startDate,
              endDate: contract.endDate,
              };
            }),
          },
        };
      }

      function renderApiEndpointButtons() {
        const endpoints = [
          { id: "list", label: "List contracts" },
          { id: "detail", label: "Get one contract" },
          { id: "customers", label: "List customers" },
          { id: "dataset", label: "Full data.json" },
        ];

        elements.apiEndpointButtons.innerHTML = endpoints
          .map(
            (endpoint) => `
              <button
                class="endpoint-button ${endpoint.id === state.apiEndpoint ? "active" : ""}"
                type="button"
                data-api-endpoint="${endpoint.id}"
              >
                ${escapeHtml(endpoint.label)}
              </button>
            `
          )
          .join("");

        elements.apiEndpointButtons.querySelectorAll("[data-api-endpoint]").forEach((node) => {
          node.addEventListener("click", () => {
            state.apiEndpoint = node.dataset.apiEndpoint;
            renderApiConsole();
          });
        });
      }

      function updateSelectedContractCustomer(customerName) {
        const nextCustomer = state.customers.find((customer) => customer.name.toLowerCase() === customerName.trim().toLowerCase());
        const contract = state.contracts.find((item) => item.id === state.selectedContractId);

        if (!contract || !nextCustomer) {
          return false;
        }

        contract.customerId = nextCustomer.id;
        return true;
      }

      function bindContractCustomerEditor(root) {
        const searchInput = root.querySelector("#customerSearchInput");
        const applyButton = root.querySelector("#applyCustomerChangeButton");

        if (!searchInput || !applyButton) {
          return;
        }

        const applyChange = () => {
          if (updateSelectedContractCustomer(searchInput.value)) {
            render();
            return;
          }

          searchInput.setCustomValidity("Client introuvable dans la table customers.");
          searchInput.reportValidity();
          setTimeout(() => searchInput.setCustomValidity(""), 0);
        };

        applyButton.addEventListener("click", applyChange);
        searchInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            applyChange();
          }
        });
      }

      function renderContractsList() {
        const contracts = state.filteredContracts;
        elements.contractsCount.textContent = `${contracts.length}`;

        if (!contracts.length) {
          elements.contractsList.innerHTML = `<div class="empty">Aucun résultat</div>`;
          return;
        }

        elements.contractsList.innerHTML = `
          ${
            state.filterMode === "3"
              ? `
                <div class="contracts-table-toolbar">
                  <button class="table-toolbar-button" type="button" id="toggleHeaderFiltersButton">
                    ${state.headerFiltersOpen ? "Masquer les filtres" : "Afficher les filtres"}
                  </button>
                  <button class="table-toolbar-button subtle-button" type="button" id="clearHeaderFiltersButton">
                    Réinitialiser
                  </button>
                </div>
              `
              : ""
          }
          <div class="contracts-table-wrap">
            <table class="contracts-table">
              <thead>
                <tr>
                  <th>
                    <div class="th-content">
                      <span>Référence</span>
                      ${state.filterMode === "2" ? renderPopoverFilter("reference", "Référence", "text") : ""}
                    </div>
                  </th>
                  <th>
                    <div class="th-content">
                      <span>Contrat</span>
                      ${state.filterMode === "2" ? renderPopoverFilter("contract", "Contrat", "text") : ""}
                    </div>
                  </th>
                  <th>
                    <div class="th-content">
                      <span>Client</span>
                      ${state.filterMode === "2" ? renderPopoverFilter("client", "Client", "multi") : ""}
                    </div>
                  </th>
                  <th>
                    <div class="th-content">
                      <span>Type</span>
                      ${state.filterMode === "2" ? renderPopoverFilter("type", "Type", "multi") : ""}
                    </div>
                  </th>
                  <th>
                    <div class="th-content">
                      <span>Région</span>
                      ${state.filterMode === "2" ? renderPopoverFilter("region", "Région", "multi") : ""}
                    </div>
                  </th>
                  <th>Période</th>
                  <th>
                    <div class="th-content">
                      <span>Statut</span>
                      ${state.filterMode === "2" ? renderPopoverFilter("status", "Statut", "multi") : ""}
                    </div>
                  </th>
                </tr>
                ${renderHeaderFilters()}
              </thead>
              <tbody>
                ${contracts
                  .map((contract) => {
                    const hydratedContract = hydrateContract(contract);
                    const isActive = contract.id === state.selectedContractId ? ' class="active"' : "";
                    return `
                      <tr data-contract-id="${escapeHtml(contract.id)}"${isActive} tabindex="0">
                        <td><strong>${escapeHtml(hydratedContract.id)}</strong></td>
                        <td>
                          <div class="table-cell-stack">
                            <span>${escapeHtml(hydratedContract.name)}</span>
                            <span class="subtle">${escapeHtml(hydratedContract.managingTeam.name)}</span>
                          </div>
                        </td>
                        <td>${escapeHtml(hydratedContract.customer.name)}</td>
                        <td><span class="tag">${escapeHtml(hydratedContract.type)}</span></td>
                        <td>${escapeHtml(hydratedContract.region)}</td>
                        <td>
                          <div class="table-cell-stack">
                            <span>${escapeHtml(formatDate(hydratedContract.startDate))}</span>
                            <span class="subtle">${escapeHtml(formatDate(hydratedContract.endDate))}</span>
                          </div>
                        </td>
                        <td><span class="pill ${widgetStatusClass(hydratedContract.globalValidationStatus)}">${escapeHtml(hydratedContract.globalValidationStatus)}</span></td>
                      </tr>
                    `;
                  })
                  .join("")}
              </tbody>
            </table>
          </div>
        `;

        bindContractsTableEvents();
      }

      function bindContractsTableEvents() {
        elements.contractsList.querySelectorAll("[data-contract-id]").forEach((node) => {
          const selectContract = () => {
            state.selectedContractId = node.dataset.contractId;
            render();
            openContractModal();
          };

          node.addEventListener("click", selectContract);
          node.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              selectContract();
            }
          });
        });

        elements.contractsList.querySelectorAll("[data-column-filter]").forEach((node) => {
          const update = () => setColumnTextFilter(node.dataset.columnFilter, node.value);
          node.addEventListener("input", update);
          node.addEventListener("change", update);
          node.addEventListener("click", (event) => event.stopPropagation());
        });

        elements.contractsList.querySelectorAll("[data-filter-popover-toggle]").forEach((node) => {
          node.addEventListener("click", (event) => {
            event.stopPropagation();
            const key = node.dataset.filterPopoverToggle;
            state.activeHeaderPopover = state.activeHeaderPopover === key ? null : key;
            state.popoverSearch = "";
            renderContractsList();
          });
        });

        elements.contractsList.querySelectorAll("[data-filter-search]").forEach((node) => {
          node.addEventListener("input", (event) => {
            event.stopPropagation();
            const key = node.dataset.filterSearch;
            if (["reference", "contract"].includes(key)) {
              setColumnTextFilter(key, node.value);
              return;
            }
            state.popoverSearch = node.value;
            renderContractsList();
          });
          node.addEventListener("click", (event) => event.stopPropagation());
        });

        elements.contractsList.querySelectorAll("[data-filter-option]").forEach((node) => {
          node.addEventListener("change", (event) => {
            event.stopPropagation();
            toggleColumnSelectedValue(node.dataset.filterOption, node.value);
          });
          node.addEventListener("click", (event) => event.stopPropagation());
        });

        elements.contractsList.querySelectorAll("[data-filter-reset]").forEach((node) => {
          node.addEventListener("click", (event) => {
            event.stopPropagation();
            const key = node.dataset.filterReset;
            state.columnFilters[key] = ["reference", "contract"].includes(key)
              ? { text: "" }
              : { text: "", selected: [] };
            state.popoverSearch = "";
            render();
          });
        });

        const toggleHeaderFiltersButton = elements.contractsList.querySelector("#toggleHeaderFiltersButton");
        if (toggleHeaderFiltersButton) {
          toggleHeaderFiltersButton.addEventListener("click", () => {
            state.headerFiltersOpen = !state.headerFiltersOpen;
            renderContractsList();
          });
        }

        const clearHeaderFiltersButton = elements.contractsList.querySelector("#clearHeaderFiltersButton");
        if (clearHeaderFiltersButton) {
          clearHeaderFiltersButton.addEventListener("click", () => {
            clearAllColumnFilters();
            render();
          });
        }
      }

      function renderPreview() {
        const contract = getSelectedContract();
        const previewHtml = buildPreviewHtml(contract);
        elements.contractPreview.innerHTML = previewHtml;
        elements.contractModalContent.innerHTML = previewHtml;
        bindContractCustomerEditor(elements.contractModalContent);
      }

      function renderApiConsole() {
        renderApiEndpointButtons();
        elements.apiContractSelect.value = state.selectedContractId || "";

        const apiState = buildApiPayload();
        elements.apiRoute.textContent = apiState.route;
        elements.apiMeta.innerHTML = apiState.meta.map((item) => `<span class="tag">${escapeHtml(item)}</span>`).join("");
        elements.jsonPayload.textContent = JSON.stringify(apiState.payload, null, 2);
      }

      function isTableLine(line) {
        return /^\|(.+)\|$/.test(line.trim());
      }

      function parseTable(lines, startIndex) {
        const rows = [];
        let index = startIndex;

        while (index < lines.length && isTableLine(lines[index])) {
          rows.push(
            lines[index]
              .trim()
              .slice(1, -1)
              .split("|")
              .map((cell) => cell.trim())
          );
          index += 1;
        }

        if (rows.length < 2 || !rows[1].every((cell) => /^:?-{3,}:?$/.test(cell))) {
          return null;
        }

        const headers = rows[0];
        const bodyRows = rows.slice(2);

        return {
          nextIndex: index,
          html: `
            <div class="docs-card">
              <table>
                <thead>
                  <tr>${headers.map((cell) => `<th>${inlineMarkdown(cell)}</th>`).join("")}</tr>
                </thead>
                <tbody>
                  ${bodyRows
                    .map((row) => `<tr>${row.map((cell) => `<td>${inlineMarkdown(cell)}</td>`).join("")}</tr>`)
                    .join("")}
                </tbody>
              </table>
            </div>
          `,
        };
      }

      function markdownToHtml(markdown) {
        const lines = markdown.replace(/\r\n/g, "\n").split("\n");
        const html = [];
        let index = 0;

        while (index < lines.length) {
          const trimmed = lines[index].trim();

          if (!trimmed) {
            index += 1;
            continue;
          }

          if (trimmed.startsWith("```")) {
            const language = trimmed.slice(3).trim();
            const codeLines = [];
            index += 1;

            while (index < lines.length && !lines[index].trim().startsWith("```")) {
              codeLines.push(lines[index]);
              index += 1;
            }

            if (language === "mermaid") {
              html.push(`
                <div class="docs-card mermaid-card">
                  <div class="mermaid">${escapeHtml(codeLines.join("\n"))}</div>
                </div>
              `);
            } else {
              html.push(`
                <div class="docs-card">
                  <pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>
                </div>
              `);
            }

            index += 1;
            continue;
          }

          const table = parseTable(lines, index);
          if (table) {
            html.push(table.html);
            index = table.nextIndex;
            continue;
          }

          if (/^#{1,6}\s/.test(trimmed)) {
            const level = trimmed.match(/^#+/)[0].length;
            html.push(`<h${level}>${inlineMarkdown(trimmed.replace(/^#{1,6}\s/, ""))}</h${level}>`);
            index += 1;
            continue;
          }

          if (trimmed.startsWith(">")) {
            const quoteLines = [];
            while (index < lines.length && lines[index].trim().startsWith(">")) {
              quoteLines.push(lines[index].trim().replace(/^>\s?/, ""));
              index += 1;
            }
            html.push(`<blockquote>${quoteLines.map((item) => inlineMarkdown(item)).join("<br />")}</blockquote>`);
            continue;
          }

          if (/^[-*]\s+/.test(trimmed)) {
            const items = [];
            while (index < lines.length && /^[-*]\s+/.test(lines[index].trim())) {
              items.push(lines[index].trim().replace(/^[-*]\s+/, ""));
              index += 1;
            }
            html.push(`<div class="docs-card"><ul>${items.map((item) => `<li>${inlineMarkdown(item)}</li>`).join("")}</ul></div>`);
            continue;
          }

          if (/^\d+\.\s+/.test(trimmed)) {
            const items = [];
            while (index < lines.length && /^\d+\.\s+/.test(lines[index].trim())) {
              items.push(lines[index].trim().replace(/^\d+\.\s+/, ""));
              index += 1;
            }
            html.push(`<div class="docs-card"><ol>${items.map((item) => `<li>${inlineMarkdown(item)}</li>`).join("")}</ol></div>`);
            continue;
          }

          const paragraphLines = [];
          while (
            index < lines.length &&
            lines[index].trim() &&
            !/^#{1,6}\s/.test(lines[index].trim()) &&
            !lines[index].trim().startsWith("```") &&
            !lines[index].trim().startsWith(">") &&
            !/^[-*]\s+/.test(lines[index].trim()) &&
            !/^\d+\.\s+/.test(lines[index].trim()) &&
            !isTableLine(lines[index])
          ) {
            paragraphLines.push(lines[index].trim());
            index += 1;
          }

          html.push(`<p>${inlineMarkdown(paragraphLines.join(" "))}</p>`);
        }

        return html.join("");
      }

      async function renderDocs() {
        if (!state.docsMarkdown) {
          elements.docsContent.innerHTML = `<div class="empty">Documentation indisponible</div>`;
          return;
        }

        elements.docsContent.innerHTML = markdownToHtml(state.docsMarkdown);

        const mermaidBlocks = [...elements.docsContent.querySelectorAll(".mermaid")];
        for (const [blockIndex, node] of mermaidBlocks.entries()) {
          const definition = node.textContent;
          const { svg } = await mermaid.render(`mermaid-doc-${blockIndex}-${Date.now()}`, definition);
          node.innerHTML = svg;
        }
      }

      function renderActiveView() {
        const isContracts = state.activeView === "contracts";
        const isDocs = state.activeView === "docs";
        const isApi = state.activeView === "api";

        if (elements.contractsView) {
          elements.contractsView.classList.toggle("hidden", !isContracts);
        }
        if (elements.docsView) {
          elements.docsView.classList.toggle("hidden", !isDocs);
        }
        if (elements.previewSidebar) {
          elements.previewSidebar.classList.toggle("hidden", !isApi);
        }
        if (elements.previewPanel) {
          elements.previewPanel.classList.add("hidden");
        }
        if (elements.apiConsole) {
          elements.apiConsole.classList.toggle("hidden", !isApi);
        }
        if (elements.appShell) {
          elements.appShell.classList.toggle("docs-mode", !isApi);
        }

        elements.navItems.forEach((node) => {
          node.classList.toggle("active", node.dataset.view === state.activeView);
        });
      }

      function applyFilters() {
        const filters = Object.fromEntries(
          Object.entries(state.columnFilters).map(([key, value]) => [
            key,
            {
              text: String(value.text || "").trim().toLowerCase(),
              selected: (value.selected || []).map((item) => item.toLowerCase()),
            },
          ])
        );

        state.filteredContracts = state.contracts.filter((contract) => {
          const hydratedContract = hydrateContract(contract);
          const matchesReference = !filters.reference.text || hydratedContract.id.toLowerCase().includes(filters.reference.text);
          const matchesContract =
            !filters.contract.text ||
            [hydratedContract.name, hydratedContract.managingTeam.name].join(" ").toLowerCase().includes(filters.contract.text);
          const matchesClient =
            (!filters.client.text ||
              [hydratedContract.customer.name, hydratedContract.customer.accountCode].join(" ").toLowerCase().includes(filters.client.text)) &&
            (!(filters.client.selected || []).length ||
              filters.client.selected.includes(hydratedContract.customer.name.toLowerCase()));
          const matchesType =
            !(filters.type.selected || []).length || filters.type.selected.includes(hydratedContract.type.toLowerCase());
          const matchesRegion =
            !(filters.region.selected || []).length || filters.region.selected.includes(hydratedContract.region.toLowerCase());
          const matchesStatus =
            !(filters.status.selected || []).length ||
            filters.status.selected.includes(hydratedContract.globalValidationStatus.toLowerCase());
          return matchesReference && matchesContract && matchesClient && matchesType && matchesRegion && matchesStatus;
        });

        if (!state.filteredContracts.some((contract) => contract.id === state.selectedContractId)) {
          state.selectedContractId = state.filteredContracts[0]?.id || null;
        }
      }

      function openContractModal() {
        elements.contractModal.classList.add("open");
        elements.contractModal.setAttribute("aria-hidden", "false");
      }

      function closeContractModal() {
        elements.contractModal.classList.remove("open");
        elements.contractModal.setAttribute("aria-hidden", "true");
      }

      function bindStaticEvents() {
        elements.navItems.forEach((node) => {
          node.addEventListener("click", async () => {
            state.activeView = node.dataset.view;
            renderActiveView();

            if (state.activeView === "docs") {
              await renderDocs();
              return;
            }

            if (state.activeView === "api") {
              renderApiConsole();
              return;
            }

            render();
          });
        });
        elements.searchInput.addEventListener("input", render);
        elements.statusFilter.addEventListener("change", render);
        elements.typeFilter.addEventListener("change", render);
        elements.filterModeSwitch.querySelectorAll("[data-filter-mode]").forEach((node) => {
          node.addEventListener("click", () => {
            state.filterMode = node.dataset.filterMode;
            state.activeHeaderPopover = null;
            state.headerFiltersOpen = state.filterMode === "3" ? state.headerFiltersOpen : false;
            render();
          });
        });
        elements.apiContractSelect.addEventListener("change", () => {
          state.selectedContractId = elements.apiContractSelect.value || state.contracts[0]?.id || null;
          render();
        });
        if (elements.openPreviewModalButton) {
          elements.openPreviewModalButton.addEventListener("click", openContractModal);
        }
        elements.closeContractModalButton.addEventListener("click", closeContractModal);
        elements.contractModal.addEventListener("click", (event) => {
          if (event.target === elements.contractModal) {
            closeContractModal();
          }
        });
        window.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            closeContractModal();
            if (state.activeHeaderPopover) {
              state.activeHeaderPopover = null;
              renderContractsList();
            }
          }
        });
        document.addEventListener("click", () => {
          if (state.activeHeaderPopover) {
            state.activeHeaderPopover = null;
            renderContractsList();
          }
        });
      }

      function render() {
        applyFilters();
        renderActiveView();
        renderContractsList();
        renderPreview();
        renderApiConsole();
        renderIcons();
        elements.filterModeSwitch.querySelectorAll("[data-filter-mode]").forEach((node) => {
          node.classList.toggle("active", node.dataset.filterMode === state.filterMode);
        });
      }

      async function loadDocs() {
        try {
          const response = await fetch("./docs.md");

          if (!response.ok) {
            throw new Error(`Unable to load docs.md (${response.status})`);
          }

          state.docsMarkdown = await response.text();
        } catch (error) {
          state.docsMarkdown = "# Docs\n\nLa documentation n'a pas pu être chargée.";
          console.error(error);
        }
      }

      async function init() {
        try {
          await loadDocs();

          const response = await fetch("./data.json");
          if (!response.ok) {
            throw new Error(`Unable to load data.json (${response.status})`);
          }

          const payload = await response.json();
          state.customers = payload.customers || [];
          state.contracts = payload.contracts || [];
          state.filteredContracts = [...state.contracts];
          state.selectedContractId = state.contracts[0]?.id || null;

          buildOptions(elements.statusFilter, [...new Set(state.contracts.map((contract) => contract.status))]);
          buildOptions(elements.typeFilter, [...new Set(state.contracts.map((contract) => contract.type))]);
          buildContractSelectOptions();
        } catch (error) {
          elements.contractsList.innerHTML = `<div class="empty">Chargement impossible</div>`;
          console.error(error);
        }

        bindStaticEvents();
        bindPreviewResize();
        render();
      }

      init();
    </script>
  </body>
</html>
